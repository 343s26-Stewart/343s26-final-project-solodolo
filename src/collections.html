<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collections - Dial</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-divider"><h1><a href="about.html">Dial</a></h1></div>
            <a href="index.html">Search</a>
            <a href="#" class="active" aria-current="page">My Collections</a>
            <!-- Export/Import per design sketch; hidden file input used for import -->
            <div class="nav-actions">
                <button id="export-btn" type="button" class="nav-btn">Export</button>
                <button id="import-btn" type="button" class="nav-btn">Import</button>
                <input type="file" id="import-input" accept=".json" class="sr-only" aria-label="Import collections JSON file">
            </div>
        </nav>
    </header>
    <main>
        <section class="view-section">
            <h2>My Collections</h2>
            <!-- Filter buttons: dynamically populated from collections -->
            <div class="filter-buttons" id="filter-buttons"></div>
            <!-- Collection manager: toggled by the Edit button in the filter row -->
            <div class="collections-manager" id="collections-manager" hidden></div>
            <!-- Artist cards matching the active filter -->
            <div class="results" id="results"></div>
        </section>
    </main>
    <script src="utils.js"></script>
    <script src="collections-store.js"></script>
    <script src="collections.js"></script>
</body>
</html>
