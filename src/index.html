<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dial - Music Discovery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-divider"><h1>Dial</h1></div>
            <a href="#" class="active" aria-current="page">Search</a>
            <a href="#">My Collections</a>
        </nav>
    </header>
    <main>
        <section class="search-section">
            <h2>Discover new music</h2>
            <div class="search-bar">
                <label for="search-input" class="sr-only">Search for an artist</label>
                <input type="text" id="search-input" placeholder="Search for an artist..." aria-describedby="search-help">
                <button id="search-button" type="button" aria-label="Search">→</button>
            </div>
            <p id="search-help" class="sr-only">Type an artist name and press the search button to find artists' information.</p>
            <div class="results" id="results">
                <!-- Sample results for initial design -->
                <article class="artist-card">
                    <div class="avatar">TL</div>
                    <div class="info">
                        <h3>The Lumineers</h3>
                        <p>folk · americana</p>
                    </div>
                    <button class="view-btn" type="button">View →</button>
                </article>
                <article class="artist-card">
                    <div class="avatar">T5</div>
                    <div class="info">
                        <h3>The 502s</h3>
                        <p>folk · americana</p>
                    </div>
                    <button class="view-btn" type="button">View →</button>
                </article>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
