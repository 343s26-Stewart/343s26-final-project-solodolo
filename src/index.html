<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dial - Music Discovery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-divider"><h1>Dial</h1></div>
            <a href="#" id="nav-search" class="active" aria-current="page">Search</a>
            <a href="collections.html" id="nav-collections">My Collections</a>
            <!-- Back link is hidden until the artist view is open -->
            <a href="#" id="nav-back" class="back-link" hidden>← Back to results</a>
        </nav>
    </header>
    <main>
        <section class="view-section" id="search-view">
            <h2>Discover new music</h2>
            <div class="search-bar">
                <label for="search-input" class="sr-only">Search for an artist</label>
                <input type="text" id="search-input" placeholder="Search for an artist..." aria-describedby="search-help">
                <button id="search-button" type="button" aria-label="Search">→</button>
            </div>
            <p id="search-help" class="sr-only">Type an artist name and press the search button to find artists' information.</p>
            <div class="results" id="results">
                <p>Enter an artist name to search.</p>
            </div>
        </section>

        <!-- Artist detail view is built and injected by search.js on first use -->
    </main>
    <script src="search.js"></script>
</body>
</html>
